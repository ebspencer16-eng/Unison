<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attune — Access Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Cormorant+SC:wght@300;400;500;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-print-color-adjust:exact; print-color-adjust:exact; }

body {
  background: #D4CFC8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 2rem;
  font-family: 'Cormorant Garamond', Georgia, serif;
  /* Subtle linen texture */
  background-image: repeating-linear-gradient(
    45deg, transparent, transparent 2px, rgba(0,0,0,.015) 2px, rgba(0,0,0,.015) 4px
  );
}

/* ─── Controls ─── */
.controls {
  display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
  margin-bottom: 3rem; background: rgba(255,255,255,.7);
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.6);
  border-radius: 10px; padding: 1rem 1.5rem;
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
}
.ctrl-group { display: flex; flex-direction: column; gap: .25rem; }
.ctrl-label { font-family: 'Cormorant SC', serif; font-size: .6rem; letter-spacing: .2em; color: #8C7A68; }
.ctrl-input {
  background: transparent; border: none; border-bottom: 1px solid #C4B8AA;
  padding: .2rem .1rem; font-family: 'Cormorant Garamond', serif; font-size: .88rem;
  color: #1E1610; outline: none; width: 140px;
}
.ctrl-input:focus { border-bottom-color: #E8673A; }
.ctrl-select {
  background: transparent; border: none; border-bottom: 1px solid #C4B8AA;
  padding: .2rem .1rem; font-family: 'Cormorant Garamond', serif; font-size: .88rem;
  color: #1E1610; outline: none; cursor: pointer; width: 160px;
  -webkit-appearance: none;
}
.print-btn {
  background: #1E1610; color: #F5EFE4; border: none;
  padding: .55rem 1.5rem; font-family: 'Cormorant SC', serif;
  font-size: .75rem; letter-spacing: .15em; cursor: pointer;
  border-radius: 2px; transition: opacity .2s;
}
.print-btn:hover { opacity: .85; }

/* ─── Card wrapper ─── */
.card-scene {
  perspective: 1000px;
}
.card-shadow-wrap {
  filter: drop-shadow(0 30px 60px rgba(0,0,0,.22)) drop-shadow(0 8px 20px rgba(0,0,0,.14));
}

/* ─── Card base ─── */
.spark-card {
  width: 3.5in;
  height: 5.5in;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  overflow: hidden;
  border-radius: 2px;
}

/* Grain overlay on all cards */
.spark-card::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 180px;
  mix-blend-mode: multiply;
  opacity: .6;
}

/* ─── FOUNDATION ─── warm copper engraved ─── */
.card-foundation {
  background: #FDF8F2;
}
.card-foundation .card-bg-ornament {
  position: absolute; inset: 0; pointer-events: none;
}

/* ─── STARTING OUT ─── botanical champagne ─── */
.card-newlywed {
  background: #FDFBF5;
}

/* ─── ANNIVERSARY ─── celestial midnight ─── */
.card-anniversary {
  background: #0A0C1E;
}

/* ─── PREMIUM ─── prestige noir ─── */
.card-premium {
  background: #0C0A08;
}

/* ─── Card inner content ─── */
.card-inner {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center;
  padding: .28in .3in;
}

/* Wordmark row */
.card-wordmark {
  display: flex; align-items: center; gap: .35rem;
  margin-bottom: .12in;
}
.card-wordmark-text {
  font-family: 'Cormorant SC', serif;
  font-weight: 400;
  letter-spacing: .22em;
  text-transform: uppercase;
}

/* Pkg label */
.card-pkg {
  font-family: 'Cormorant SC', serif;
  font-size: .74rem;
  font-weight: 400;
  letter-spacing: .3em;
  text-transform: uppercase;
  margin-bottom: .08in;
}

/* Horizontal rule */
.card-rule {
  display: flex; align-items: center; gap: .12in;
  width: 100%; margin: .06in 0;
}
.card-rule-line { flex: 1; height: 1px; }
.card-rule-diamond { font-size: .7rem; flex-shrink: 0; }

/* Names display */
.card-names {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  text-align: center;
  line-height: 1.1;
  letter-spacing: .01em;
  margin: .1in 0;
}

/* QR region */
.qr-region {
  display: flex; flex-direction: column; align-items: center;
  gap: .07in; margin: .08in 0;
}
.qr-caption {
  font-family: 'Cormorant SC', serif;
  font-size: .64rem;
  letter-spacing: .22em;
  text-align: center;
}
.qr-frame-outer {
  position: relative;
  padding: .1in;
}
.qr-inner { display: block; }

/* Access code */
.card-code-label {
  font-family: 'Cormorant SC', serif;
  font-size: .6rem;
  letter-spacing: .28em;
  margin-bottom: .03in;
  text-align: center;
}
.card-code {
  font-family: 'Cormorant SC', serif;
  font-size: 1.05rem;
  letter-spacing: .18em;
  text-align: center;
}

/* Footer */
.card-footer-text {
  font-family: 'Cormorant SC', serif;
  font-size: .56rem;
  letter-spacing: .22em;
  text-align: center;
  line-height: 1.8;
}

/* ─── Shared gradient utility (applied via JS inline SVG on wordmark/rules) ─── */
.grad-text {
  background: linear-gradient(90deg, #E8673A, #1B5FE8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ─── Foundation colors ─── warm ivory + orange accent ─── */
.card-foundation { background: #FDFAF5; }
.card-foundation .card-wordmark-text { font-size: .86rem; color: #E8673A; }
.card-foundation .card-pkg { color: #C4532B; }
.card-foundation .card-rule-line { background: linear-gradient(90deg,#E8673A,#1B5FE8); height: 1.5px; opacity: .55; }
.card-foundation .card-rule-diamond { color: #E8673A; }
.card-foundation .card-names { font-size: 1.85rem; color: #1A0D06; }
.card-foundation .qr-caption { color: #C4532B; opacity: .75; }
.card-foundation .card-code-label { color: #9A4020; }
.card-foundation .card-code { color: #E8673A; }
.card-foundation .card-footer-text { color: rgba(200,90,50,.5); }

/* ─── Starting Out colors ─── ivory + orange→blue gradient accents ─── */
.card-newlywed { background: #FDFCF8; }
.card-newlywed .card-wordmark-text { font-size: .86rem; color: #E8673A; }
.card-newlywed .card-pkg { color: #1B5FE8; }
.card-newlywed .card-rule-line { background: linear-gradient(90deg,#E8673A,#1B5FE8); height: 1.5px; opacity: .5; }
.card-newlywed .card-rule-diamond { color: #1B5FE8; }
.card-newlywed .card-names { font-size: 1.85rem; color: #0E1828; }
.card-newlywed .qr-caption { color: #1B5FE8; opacity: .7; }
.card-newlywed .card-code-label { color: #2244AA; }
.card-newlywed .card-code { color: #1B5FE8; }
.card-newlywed .card-footer-text { color: rgba(27,95,232,.4); }

/* ─── Anniversary colors ─── deep navy + gold + gradient ─── */
.card-anniversary { background: #080B1C; }
.card-anniversary .card-wordmark-text { font-size: .86rem; color: #E8A83A; }
.card-anniversary .card-pkg { color: rgba(232,168,58,.65); }
.card-anniversary .card-rule-line { background: linear-gradient(90deg,#E8673A,#E8A83A,#1B5FE8); height: 1px; opacity: .55; }
.card-anniversary .card-rule-diamond { color: #E8A83A; }
.card-anniversary .card-names { font-size: 1.85rem; color: #EDE8FF; }
.card-anniversary .qr-caption { color: rgba(232,168,58,.6); }
.card-anniversary .card-code-label { color: rgba(232,168,58,.5); }
.card-anniversary .card-code { color: #E8A83A; }
.card-anniversary .card-footer-text { color: rgba(232,168,58,.3); }

/* ─── Premium colors ─── deep charcoal + full gradient ─── */
.card-premium { background: #090807; }
.card-premium .card-wordmark-text { font-size: .86rem; color: #E8673A; }
.card-premium .card-pkg { color: rgba(255,255,255,.45); }
.card-premium .card-rule-line { background: linear-gradient(90deg,#E8673A,#1B5FE8); height: 1.5px; opacity: .7; }
.card-premium .card-rule-diamond { color: rgba(255,255,255,.5); }
.card-premium .card-names { font-size: 1.85rem; color: rgba(255,255,255,.94); }
.card-premium .qr-caption { color: rgba(255,255,255,.38); }
.card-premium .card-code-label { color: rgba(255,255,255,.32); }
.card-premium .card-code { color: rgba(255,255,255,.78); }
.card-premium .card-footer-text { color: rgba(255,255,255,.22); }

/* ─── Print ─── */
@media print {
  body { background: white; padding: 0; }
  .controls { display: none; }
  .card-shadow-wrap { filter: none; }
  .spark-card { box-shadow: none; border: none; }
  .spark-card::after { display: none; }
  @page { size: 3.5in 5.5in; margin: 0; }
}
</style>
</head>
<body>

<!-- Controls -->
<div class="controls">
  <div class="ctrl-group">
    <label class="ctrl-label">Package</label>
    <select class="ctrl-select" id="ctrl-pkg" onchange="updateCard()">
      <option value="foundation">The Foundation</option>
      <option value="newlywed" selected>Starting Out</option>
      <option value="anniversary">Anniversary</option>
      <option value="premium">Premium</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label class="ctrl-label">Names</label>
    <input class="ctrl-input" id="ctrl-names" value="Sarah & James" oninput="updateCard()">
  </div>
  <div class="ctrl-group">
    <label class="ctrl-label">Order ID</label>
    <input class="ctrl-input" id="ctrl-order" value="SP-14829" oninput="updateCard()" style="width:100px">
  </div>
  <button class="print-btn" onclick="window.print()">Print</button>
</div>

<!-- Card -->
<div class="card-scene">
  <div class="card-shadow-wrap">
    <div class="spark-card card-newlywed" id="spark-card">

      <!-- Full-bleed SVG decoration layer -->
      <svg id="card-svg" style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none" viewBox="0 0 336 528" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <!-- decoration injected by JS -->
      </svg>

      <!-- Content -->
      <div class="card-inner">

        <!-- Wordmark -->
        <div class="card-wordmark">
          <svg id="card-logo" width="22" height="16" viewBox="0 0 103 76" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- filled by JS -->
          </svg>
          <span class="card-wordmark-text">Attune</span>
        </div>

        <!-- Pkg label -->
        <div class="card-pkg" id="card-pkg-label">Starting Out Collection</div>

        <!-- Top rule -->
        <div class="card-rule">
          <div class="card-rule-line"></div>
          <span class="card-rule-diamond">✦</span>
          <div class="card-rule-line"></div>
        </div>

        <!-- Names -->
        <div class="card-names" id="card-names">Sarah &amp; James</div>

        <!-- Mid rule -->
        <div class="card-rule">
          <div class="card-rule-line"></div>
          <span class="card-rule-diamond">✦</span>
          <div class="card-rule-line"></div>
        </div>

        <!-- QR region -->
        <div class="qr-region">
          <div class="qr-caption" id="card-qr-caption">Scan to begin your exercises</div>
          <!-- QR frame SVG -->
          <svg id="qr-svg-frame" viewBox="0 0 140 140" style="position:relative;flex-shrink:0;"></svg>
          <div class="card-code-label">Access code</div>
          <div class="card-code" id="card-code">SPK · 000 · 000</div>
        </div>

        <!-- Bottom rule -->
        <div class="card-rule" style="margin-top:auto">
          <div class="card-rule-line"></div>
          <span class="card-rule-diamond">✦</span>
          <div class="card-rule-line"></div>
        </div>

        <!-- Footer -->
        <div class="card-footer-text" id="card-footer">
          attune.com &nbsp;·&nbsp; one-time access &nbsp;·&nbsp; <span id="card-order-id">SP-00000</span>
        </div>

      </div>

    </div>
  </div>
</div>

<script>
// ─── QR generation ───────────────────────────────────
const params = new URLSearchParams(window.location.search);
const urlToken  = params.get('token') || '';
const urlPkg    = params.get('pkg') || '';
const urlNames  = params.get('names') ? decodeURIComponent(params.get('names')) : '';
const urlOrder  = params.get('orderId') || '';

let _token = urlToken;
let _shortCode = '';

function randStr(len, chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789') {
  return Array.from({length:len}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}
function genShortCode() {
  return 'SPK·' + randStr(3,'ABCDEFGHJKLMNPQRSTUVWXYZ') + '·' + randStr(3,'23456789ABCDEFGHJKLMNPQRSTUVWXYZ');
}

// ─── Package config ───────────────────────────────────
const PKGS = {
  foundation: {
    cls: 'card-foundation',
    label: 'The Foundation',
    caption: 'Scan to access your exercises',
    footer: 'Your individual answers remain private until results unlock.',
    logoFill: '#E8673A',
    logoStroke: '#1B5FE8',
    svgDeco: (W, H) => `
      <defs>
        <linearGradient id="fd-grad" x1="0" y1="0" x2="${W}" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#E8673A" stop-opacity=".55"/>
          <stop offset="100%" stop-color="#1B5FE8" stop-opacity=".35"/>
        </linearGradient>
      </defs>
      <rect x="12" y="12" width="${W-24}" height="${H-24}" fill="none" stroke="url(#fd-grad)" stroke-width="1"/>
      <rect x="16" y="16" width="${W-32}" height="${H-32}" fill="none" stroke="#E8673A" stroke-width=".35" opacity=".2"/>
      ${cornerCross(20, 20, '#E8673A', 7)}
      ${cornerCross(W-20, 20, '#1B5FE8', 7)}
      ${cornerCross(20, H-20, '#1B5FE8', 7)}
      ${cornerCross(W-20, H-20, '#E8673A', 7)}
      <circle cx="${W/2}" cy="${H/2}" r="60" fill="none" stroke="#E8673A" stroke-width=".4" opacity=".1" stroke-dasharray="2 4"/>
    `,
    qrFg: '#C4421A', qrBg: '#FDFAF5',
  },
  newlywed: {
    cls: 'card-newlywed',
    label: 'Starting Out Collection',
    caption: 'Scan to begin your exercises',
    footer: 'Your answers stay private — joint results unlock when both of you finish.',
    logoFill: '#E8673A',
    logoStroke: '#1B5FE8',
    svgDeco: (W, H) => `
      <defs>
        <linearGradient id="nw-grad" x1="0" y1="0" x2="${W}" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#E8673A" stop-opacity=".5"/>
          <stop offset="100%" stop-color="#1B5FE8" stop-opacity=".5"/>
        </linearGradient>
      </defs>
      <rect x="12" y="12" width="${W-24}" height="${H-24}" fill="none" stroke="url(#nw-grad)" stroke-width="1"/>
      ${botanicalCorner(14, 14, 0, '#E8673A')}
      ${botanicalCorner(W-14, 14, 90, '#1B5FE8')}
      ${botanicalCorner(14, H-14, 270, '#1B5FE8')}
      ${botanicalCorner(W-14, H-14, 180, '#E8673A')}
      <circle cx="${W/2 - 9}" cy="${H/2 + 10}" r="32" fill="none" stroke="#E8673A" stroke-width=".6" opacity=".1"/>
      <circle cx="${W/2 + 9}" cy="${H/2 + 10}" r="32" fill="none" stroke="#1B5FE8" stroke-width=".6" opacity=".1"/>
      <g opacity=".3" transform="translate(${W/2},${H*0.42})">
        <line x1="-22" y1="0" x2="-6" y2="0" stroke="#E8673A" stroke-width=".8"/>
        <circle cx="0" cy="0" r="2.5" fill="url(#nw-grad)"/>
        <line x1="6" y1="0" x2="22" y2="0" stroke="#1B5FE8" stroke-width=".8"/>
      </g>
    `,
    qrFg: '#0E1828', qrBg: '#FDFCF8',
  },
  anniversary: {
    cls: 'card-anniversary',
    label: 'Anniversary Collection',
    caption: 'Scan to begin your reflection',
    footer: 'A record of who you were, and who you\'ve become together.',
    logoFill: '#E8A83A',
    logoStroke: '#1B5FE8',
    svgDeco: (W, H) => `
      <defs>
        <linearGradient id="an-grad" x1="0" y1="0" x2="${W}" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#E8673A" stop-opacity=".6"/>
          <stop offset="50%" stop-color="#E8A83A" stop-opacity=".5"/>
          <stop offset="100%" stop-color="#1B5FE8" stop-opacity=".6"/>
        </linearGradient>
      </defs>
      ${starField(W, H, 65)}
      <rect x="11" y="11" width="${W-22}" height="${H-22}" fill="none" stroke="url(#an-grad)" stroke-width="1"/>
      <rect x="15" y="15" width="${W-30}" height="${H-30}" fill="none" stroke="#E8A83A" stroke-width=".3" opacity=".25"/>
      ${constellationCorner(18, 18, '#E8673A')}
      ${constellationCorner(W-18, 18, '#1B5FE8')}
      ${constellationCorner(18, H-18, '#1B5FE8')}
      ${constellationCorner(W-18, H-18, '#E8673A')}
      <g transform="translate(${W/2}, 28)" opacity=".6">
        <circle cx="0" cy="0" r="8" fill="none" stroke="#E8A83A" stroke-width="1"/>
        <path d="M 0 -8 A 8 8 0 0 0 0 8 A 4.5 8 0 0 1 0 -8" fill="#E8A83A" opacity=".8"/>
      </g>
    `,
    qrFg: '#EDE8FF', qrBg: '#080B1C',
  },
  premium: {
    cls: 'card-premium',
    label: 'Attune Premium',
    caption: 'Your complete access',
    footer: 'Every exercise, your results, and your LMFT session.',
    logoFill: '#E8673A',
    logoStroke: 'rgba(255,255,255,.5)',
    svgDeco: (W, H) => `
      <defs>
        <linearGradient id="pr-grad" x1="0" y1="0" x2="${W}" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#E8673A"/>
          <stop offset="50%" stop-color="#D4A030"/>
          <stop offset="100%" stop-color="#1B5FE8"/>
        </linearGradient>
      </defs>
      <!-- Full-bleed gradient stripe at top -->
      <rect x="0" y="0" width="${W}" height="4" fill="url(#pr-grad)"/>
      <!-- Hairline at bottom -->
      <rect x="0" y="${H-4}" width="${W}" height="4" fill="url(#pr-grad)" opacity=".35"/>
      <!-- Outer rule -->
      <rect x="12" y="12" width="${W-24}" height="${H-24}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width=".8"/>
      ${artDecoCorner(14, 14, 0, 'rgba(232,103,58,.45)')}
      ${artDecoCorner(W-14, 14, 90, 'rgba(27,95,232,.45)')}
      ${artDecoCorner(14, H-14, 270, 'rgba(27,95,232,.45)')}
      ${artDecoCorner(W-14, H-14, 180, 'rgba(232,103,58,.45)')}
      <circle cx="${W/2}" cy="${H/2}" r="2.5" fill="url(#pr-grad)" opacity=".3"/>
      <circle cx="${W/2}" cy="${H/2}" r="52" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
    `,
    qrFg: '#F5F0EC', qrBg: '#090807',
  },
};

// ─── SVG ornament helpers ─────────────────────────────

function cornerCross(x, y, color, size) {
  // Fine engraved cross mark at corner
  const s = size / 2;
  return `
    <line x1="${x-s}" y1="${y}" x2="${x+s}" y2="${y}" stroke="${color}" stroke-width=".8" opacity=".6"/>
    <line x1="${x}" y1="${y-s}" x2="${x}" y2="${y+s}" stroke="${color}" stroke-width=".8" opacity=".6"/>
    <circle cx="${x}" cy="${y}" r="1" fill="${color}" opacity=".5"/>
  `;
}

function botanicalCorner(x, y, rotation, color) {
  // A small botanical sprig — leaf and tendril
  const g_id = `bc${Math.random().toString(36).slice(2,6)}`;
  return `
    <g transform="translate(${x},${y}) rotate(${rotation})" opacity=".55">
      <!-- Main stem -->
      <path d="M 0 0 Q -8 -5 -14 -14" stroke="${color}" stroke-width=".9" fill="none" stroke-linecap="round"/>
      <!-- Left leaf -->
      <path d="M -6 -6 Q -12 -4 -10 -11 Q -5 -10 -6 -6" fill="${color}" opacity=".8"/>
      <!-- Right leaf -->
      <path d="M -10 -10 Q -16 -12 -12 -18 Q -8 -14 -10 -10" fill="${color}" opacity=".6"/>
      <!-- Tendril curl -->
      <path d="M -14 -14 Q -17 -16 -15 -19 Q -13 -21 -11 -19" stroke="${color}" stroke-width=".6" fill="none"/>
      <!-- Dot at base -->
      <circle cx="0" cy="0" r="1" fill="${color}" opacity=".7"/>
    </g>
  `;
}

function starField(W, H, count) {
  let stars = '';
  const rng = (max) => (Math.abs(Math.sin(stars.length * 9301 + 49297) * 233280) % max);
  for (let i = 0; i < count; i++) {
    const x = 20 + (rng(W-40));
    const y = 20 + (rng(H-40));
    const r = 0.3 + rng(0.9);
    const op = 0.15 + rng(0.5);
    stars += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(2)}" fill="#C8B870" opacity="${op.toFixed(2)}"/>`;
  }
  return stars;
}

function constellationCorner(x, y, color) {
  // Small 3-dot constellation triangle
  return `
    <circle cx="${x}" cy="${y}" r="1.2" fill="${color}" opacity=".65"/>
    <circle cx="${x+6}" cy="${y-4}" r=".8" fill="${color}" opacity=".45"/>
    <circle cx="${x+4}" cy="${y+6}" r=".7" fill="${color}" opacity=".35"/>
    <line x1="${x}" y1="${y}" x2="${x+6}" y2="${y-4}" stroke="${color}" stroke-width=".4" opacity=".3"/>
    <line x1="${x}" y1="${y}" x2="${x+4}" y2="${y+6}" stroke="${color}" stroke-width=".4" opacity=".2"/>
  `;
}

function artDecoCorner(x, y, rotation, color) {
  // Art deco fan / sunray corner piece
  return `
    <g transform="translate(${x},${y}) rotate(${rotation})">
      <line x1="0" y1="0" x2="-14" y2="0" stroke="${color}" stroke-width=".8"/>
      <line x1="0" y1="0" x2="0" y2="-14" stroke="${color}" stroke-width=".8"/>
      <line x1="0" y1="0" x2="-9" y2="-9" stroke="${color}" stroke-width=".5" opacity=".7"/>
      <line x1="0" y1="0" x2="-12" y2="-4" stroke="${color}" stroke-width=".4" opacity=".55"/>
      <line x1="0" y1="0" x2="-4" y2="-12" stroke="${color}" stroke-width=".4" opacity=".55"/>
      <circle cx="0" cy="0" r="1.5" fill="none" stroke="${color}" stroke-width=".6" opacity=".8"/>
    </g>
  `;
}

function qrCornerOrnament(x, y, rotation, color) {
  // Fine L-corner for QR frame
  const len = 10;
  return `
    <g transform="translate(${x},${y}) rotate(${rotation})">
      <line x1="0" y1="0" x2="${len}" y2="0" stroke="${color}" stroke-width="1.2" stroke-linecap="square"/>
      <line x1="0" y1="0" x2="0" y2="${len}" stroke="${color}" stroke-width="1.2" stroke-linecap="square"/>
    </g>
  `;
}

// ─── QR + frame rendering ─────────────────────────────
let _qrCanvas = null;

function renderQRtoCanvas(url, fg, bg, callback) {
  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:absolute;left:-9999px;width:120px;height:120px;';
  document.body.appendChild(tmp);
  try {
    new QRCode(tmp, {
      text: url, width: 120, height: 120,
      colorDark: fg, colorLight: bg,
      correctLevel: QRCode.CorrectLevel.M,
    });
  } catch(e) {}
  setTimeout(() => {
    const img = tmp.querySelector('img') || tmp.querySelector('canvas');
    callback(img ? (img.src || img.toDataURL()) : null);
    document.body.removeChild(tmp);
  }, 120);
}

function buildQRFrameSVG(dataUrl, fg, bg, accentColor) {
  const S = 140;
  const qrSize = 98;
  const qrX = (S - qrSize) / 2;
  const qrY = (S - qrSize) / 2;
  const pad = 4;

  const orange = '#E8673A';
  const blue   = accentColor || '#1B5FE8';

  // Corner L-marks — orange top-left & bottom-right, blue top-right & bottom-left
  const TL = qrCornerOrnament(qrX - pad, qrY - pad, 0, orange);
  const TR = qrCornerOrnament(qrX + qrSize + pad, qrY - pad, 90, blue);
  const BL = qrCornerOrnament(qrX - pad, qrY + qrSize + pad, -90, blue);
  const BR = qrCornerOrnament(qrX + qrSize + pad, qrY + qrSize + pad, 180, orange);

  const imgTag = dataUrl
    ? `<image href="${dataUrl}" x="${qrX}" y="${qrY}" width="${qrSize}" height="${qrSize}"/>`
    : `<rect x="${qrX}" y="${qrY}" width="${qrSize}" height="${qrSize}" fill="${bg}"/>
       <text x="${S/2}" y="${S/2+4}" text-anchor="middle" font-size="8" fill="${fg}" font-family="serif" opacity=".5">QR Code</text>`;

  return `<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
    <!-- Background square for QR -->
    <rect x="${qrX-2}" y="${qrY-2}" width="${qrSize+4}" height="${qrSize+4}" fill="${bg}"/>
    ${imgTag}
    ${TL}${TR}${BL}${BR}
  </svg>`;
}

// ─── Main update ──────────────────────────────────────
function updateCard() {
  const pkg  = (document.getElementById('ctrl-pkg')?.value || urlPkg || 'newlywed');
  const names = (document.getElementById('ctrl-names')?.value || urlNames || 'Sarah & James');
  const orderId = (document.getElementById('ctrl-order')?.value || urlOrder || 'SP-00000');
  const cfg = PKGS[pkg] || PKGS.newlywed;

  // Card class
  const card = document.getElementById('spark-card');
  card.className = 'spark-card ' + cfg.cls;

  // Text
  document.getElementById('card-pkg-label').textContent = cfg.label;
  document.getElementById('card-names').innerHTML = names;
  document.getElementById('card-qr-caption').textContent = cfg.caption;
  document.getElementById('card-order-id').textContent = orderId;
  document.getElementById('card-footer').innerHTML =
    `attune.com &nbsp;·&nbsp; one-time access &nbsp;·&nbsp; <span id="card-order-id">${orderId}</span>`;

  // Short code
  if (!_shortCode) _shortCode = genShortCode();
  document.getElementById('card-code').textContent = _shortCode;

  // Logo SVG fill — orange→blue gradient matching brand
  const logoSvg = document.getElementById('card-logo');
  const isDark = ['card-anniversary','card-premium'].includes(cfg.cls);
  logoSvg.innerHTML = `
    <defs>
      <linearGradient id="lg-card" x1="0" y1="0" x2="103" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#E8673A"/>
        <stop offset="100%" stop-color="#1B5FE8"/>
      </linearGradient>
    </defs>
    <path d="M14,4 L44,4 A9,9 0 0,1 53,13 L53,42 A9,9 0 0,1 44,51 L20,51 L6,61 L11,51 A6,6 0 0,1 5,45 L5,13 A9,9 0 0,1 14,4 Z" fill="url(#lg-card)"/>
    <path d="M22 11 C20 8.5 16.5 5 11.5 5 C5.5 5 2 9.5 2 14.5 C2 23 11 30 22 40 C33 30 42 23 42 14.5 C42 9.5 38.5 5 32.5 5 C27.5 5 24 8.5 22 11 Z" fill="rgba(255,255,255,0.22)" transform="translate(13.16,11.3) scale(0.72)"/>
    <path d="M89,14 L59,14 A9,9 0 0,0 50,23 L50,52 A9,9 0 0,0 59,61 L83,61 L97,71 L92,61 A6,6 0 0,0 98,55 L98,23 A9,9 0 0,0 89,14 Z" fill="none" stroke="url(#lg-card)" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M22 11 C20 8.5 16.5 5 11.5 5 C5.5 5 2 9.5 2 14.5 C2 23 11 30 22 40 C33 30 42 23 42 14.5 C42 9.5 38.5 5 32.5 5 C27.5 5 24 8.5 22 11 Z" fill="#1B5FE8" opacity="${isDark ? .55 : .7}" transform="translate(58.16,21.3) scale(0.72)"/>
  `;

  // Background decoration SVG
  const W = 336, H = 528;
  document.getElementById('card-svg').innerHTML = cfg.svgDeco(W, H);

  // QR code
  const tok = _token || randStr(32);
  _token = tok;
  const base = window.location.origin || 'https://attune.com';
  const qrUrl = base + '/portal?token=' + tok;

  renderQRtoCanvas(qrUrl, cfg.qrFg, cfg.qrBg, (dataUrl) => {
    const accent = cfg.cls === 'card-anniversary' ? '#E8A83A' : '#1B5FE8';
    const svgStr = buildQRFrameSVG(dataUrl, cfg.qrFg, cfg.qrBg, accent);
    const qrEl = document.getElementById('qr-svg-frame');
    qrEl.setAttribute('viewBox', '0 0 140 140');
    qrEl.style.width = '1.45in';
    qrEl.style.height = '1.45in';
    qrEl.innerHTML = svgStr.replace(/<svg[^>]*>/, '').replace('</svg>', '');
  });
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  if (urlToken) _token = urlToken;
  if (urlPkg && document.getElementById('ctrl-pkg')) document.getElementById('ctrl-pkg').value = urlPkg;
  if (urlNames && document.getElementById('ctrl-names')) document.getElementById('ctrl-names').value = urlNames;
  if (urlOrder && document.getElementById('ctrl-order')) document.getElementById('ctrl-order').value = urlOrder;
  _shortCode = genShortCode();
  updateCard();
  if (urlToken && urlPkg && urlNames) {
    document.querySelector('.controls').style.display = 'none';
    document.body.style.padding = '.5rem';
    setTimeout(() => window.print(), 900);
  }
});
</script>
